theme: ''
styleConstants:
  - CommonBgBrush=<WindhawkBlur BlurAmount="1" TintColor="#66000000" />
  - IslandBgBrush=<WindhawkBlur BlurAmount="2" TintColor="{ThemeResource ControlFillColorDefault}" />
  - IslandVerticalMargin=3
  - IslandHorizontalMargin=5
  - TaskbarFrameMaxWidth=8000
controlStyles:
  # Background
  - target: ':root > ScrollViewer > ScrollContentPresenter > Border > Grid'
    styles:
      - HorizontalAlignment=Stretch
      - Background:=$CommonBgBrush
      - ActualWidth=>containerGridWidth
  # Taskbar
  - target: Taskbar.TaskbarFrame
    styles:
      - Width=Auto
      - HorizontalAlignment=Center
      - Margin=0,0,$IslandHorizontalMargin,0
      - MaxWidth={{min($TaskbarFrameMaxWidth, containerGridWidth)}}
  - target: Taskbar.TaskbarFrame > Grid
    styles:
      - Background:=$IslandBgBrush
      - CornerRadius=10
      - Padding=25,0,25,0
      - Margin=0,$IslandVerticalMargin,0,$IslandVerticalMargin
  - target: Taskbar.TaskbarBackground#BackgroundControl
    styles:
      - Visibility=Collapsed
  - target: Taskbar.TaskbarFrame > Grid#RootGrid > Taskbar.TaskbarBackground > Grid > Rectangle#BackgroundFill
    styles:
      - Fill=Transparent
  # System tray
  - target: SystemTray.SystemTrayFrame
    styles:
      - Width=Auto
      - Margin=$IslandHorizontalMargin,0,0,0
  - target: Grid#SystemTrayFrameGrid
    styles:
      - Background:=$IslandBgBrush
      - CornerRadius=10
      - Padding=5,0,5,0
      - Margin=0,$IslandVerticalMargin,0,$IslandVerticalMargin
  # Weather Widget
  - target: Taskbar.TaskListButtonPanel@CommonStates > Border#BackgroundElement
    styles:
      - CornerRadius=10
  # Thumbnail preview background
  - target: Taskbar.TaskbarBackground#HoverFlyoutBackgroundControl > Grid > Rectangle#BackgroundFill
    styles:
      - Fill:=$CommonBgBrush
  # Start button image
  - target: Taskbar.ExperienceToggleButton#LaunchListButton[AutomationProperties.AutomationId=StartButton] > Taskbar.TaskListButtonPanel@CommonStates > Border#BackgroundElement
    styles:
      - Background@InactiveNormal:=<ImageBrush Stretch="Uniform" ImageSource="E:\Pictures\Íconos\Windows\Start Menu\Test\inactive_normal.png" />
      - Background@InactivePointerOver:=<ImageBrush Stretch="Uniform" ImageSource="E:\Pictures\Íconos\Windows\Start Menu\Test\inactive_pointerover.png" />
      - Background@InactivePressed:=<ImageBrush Stretch="Uniform" ImageSource="E:\Pictures\Íconos\Windows\Start Menu\Test\inactive_pressed.png" />
      - Background@ActiveNormal:=<ImageBrush Stretch="Uniform" ImageSource="E:\Pictures\Íconos\Windows\Start Menu\Test\active_normal.png" />
      - Background@ActivePointerOver:=<ImageBrush Stretch="Uniform" ImageSource="E:\Pictures\Íconos\Windows\Start Menu\Test\active_pointerover.png" />
      - Background@ActivePressed:=<ImageBrush Stretch="Uniform" ImageSource="E:\Pictures\Íconos\Windows\Start Menu\Test\active_normal.png" />
  # Hides Start button animation
  - target: Taskbar.ExperienceToggleButton#LaunchListButton[AutomationProperties.AutomationId=StartButton] > Taskbar.TaskListButtonPanel > Microsoft.UI.Xaml.Controls.AnimatedVisualPlayer#Icon
    styles:
      - Visibility=Collapsed
  # Tray overflow background
  - target: Border#OverflowFlyoutBackgroundBorder
    styles:
      - Background:=$CommonBgBrush
  # Alt+Tab background
  - target: Windows.UI.Xaml.Controls.Grid#ModalRootGrid > Windows.UI.Xaml.Controls.Border#BackgroundElement
    styles:
      - Background:=$IslandBgBrush
  # Task view background
  - target: Windows.UI.Xaml.Controls.Border#BackgroundDimmingLayer
    styles:
      - Background:=$CommonBgBrush